<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app-layout">
      <div class="hero-section">
        <h1 class="title-text">Cubic Solver</h1>

        <form id="cubic-form" class="input-container">
          <div class="field">
            <label>a</label>
            <input
              type="number"
              id="a-value"
              step="any"
              placeholder="0"
              required
            />
          </div>
          <div class="field">
            <label>b</label>
            <input type="number" id="b-value" step="any" placeholder="0" />
          </div>
          <div class="field">
            <label>c</label>
            <input type="number" id="c-value" step="any" placeholder="0" />
          </div>
          <div class="field">
            <label>d</label>
            <input type="number" id="d-value" step="any" placeholder="0" />
          </div>
          <button type="submit" class="prime-btn">Solve Cubic</button>
        </form>
      </div>

      <div id="results-display" class="is-hidden">
        <p id="equation-label" class="equation-preview"></p>
        <div class="display-grid">
          <div class="stats-panel">
            <form id="results-form" class="results-form">
              <div class="result-field">
                <span class="label">p:</span> <span id="p-value"></span>
              </div>
              <div class="result-field">
                <span class="label">q:</span> <span id="q-value"></span>
              </div>
              <div class="result-field">
                <span class="label">Δ (Discriminant):</span>
                <span id="delta-value"></span>
              </div>
              <div class="result-header">Calculated Roots</div>
              <div class="result-field">
                <span class="label">Root 1:</span> <span id="root1"></span>
                <span class="y-value"> 0 </span>
              </div>
              <div class="result-field">
                <span class="label">Root 2:</span> <span id="root2"></span>
                <span class="y-value"> 0 </span>
              </div>
              <div class="result-field">
                <span class="label">Root 3:</span> <span id="root3"></span>
                <span class="y-value"> 0 </span>
              </div>
            </form>
          </div>

          <div class="visual-panel">
            <canvas id="graph-canvas" width="600" height="400"></canvas>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
